<link rel="stylesheet" href="style.css">

<h2 align="center">College Event Contact Form</h2>

<form align="center">

    <label>Full Name:</label><br>
    <input type="text" name="fullname" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" name="phone" required><br><br>

    <label>Select Event:</label><br>
    <select name="event">
        <option>Dance Competition</option>
        <option>Music Night</option>
        <option>Coding Contest</option>
        <option>Fashion Show</option>
        <option>Quiz Competition</option>
    </select><br><br>

    <label>Your Message:</label><br>
    <textarea name="message" rows="4" cols="30"></textarea><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Clear">

</form>

</body>
</html>
